<!-- 太极核心需更新内容 读取指定槽位物品信息
 增加处理 请求不渲染鼠标上物品(类似选项) 
 怎加处理 请求获取指定槽位物品的物品名或lore
 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>主菜单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        /* 基础样式 - 浅色主题 */
        body {
            background-color: rgba(100, 100, 100, 0.2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        body.dark {
            background-color: rgba(30, 30, 30, 0.8);
            color: #f0f0f0;
        }

        /* 主题切换按钮容器 */
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .theme-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
        }

        .light-btn {
            background-color: rgba(255, 255, 255, 0.8);
            color: #333;
            border: 1px solid #ccc;
        }

        .dark-btn {
            background-color: rgba(51, 51, 51, 0.8);
            color: #f0f0f0;
            border: 1px solid #555;
        }

        .theme-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* 主容器 - 水平+垂直居中 */
        .main-wrapper {
            width: 90%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 80px; /* 给底部工具栏留空间 */
        }

        .container {
            display: flex;
            gap: 20px;
            width: 100%;
        }

        /* 左侧控制栏 */
        .sidebar {
            width: 120px;
            height: 500px; /* 固定高度，和content一致 */
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: rgba(100, 100, 100, 0.5) transparent;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            will-change: scroll-position;
            background-color: rgba(224, 224, 224, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 10px;
            transition: background-color 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overscroll-behavior-y: contain;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
            transition: all 0.2s ease;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background-color: rgba(100, 100, 100, 0.5);
            border-radius: 3px;
            transition: background-color 0.2s ease;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(80, 80, 80, 0.7);
        }

        body.dark .sidebar::-webkit-scrollbar-thumb {
            background-color: rgba(150, 150, 150, 0.5);
        }

        body.dark .sidebar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(180, 180, 180, 0.7);
        }

        body.dark .sidebar {
            background-color: rgba(45, 45, 45, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-item {
            padding: 12px;
            margin-bottom: 8px;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        body.dark .sidebar-item {
            background-color: rgba(61, 61, 61, 0.9);
            color: #f0f0f0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-item:hover {
            background-color: rgba(255, 215, 0, 0.9);
            color: #333;
            transform: translateZ(0) scale(1.02);
        }

        body.dark .sidebar-item:hover {
            background-color: rgba(0, 122, 255, 0.9);
            color: #ffffff;
            transform: translateZ(0) scale(1.02);
        }

        /* 右侧内容框 - 固定高度 + 溢出隐藏 */
        .content {
            flex: 1;
            height: 500px; /* 固定高度 */
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            overflow: hidden; /* 隐藏溢出 */
        }

        /* 按钮容器样式 - 左上堆积 + 自动换行 + 内部滚动 */
        .content-buttons {
            display: flex;
            flex-wrap: wrap; /* 自动换行 */
            align-content: flex-start; /* 关键：垂直方向顶部对齐，不均分间距 */
            gap: 15px; /* 按钮间距（水平+垂直） */
            height: 100%; /* 撑满content高度 */
            overflow-y: auto; /* 高度超出时内部滚动 */
            padding-right: 8px; /* 给滚动条留空间 */
        }

        /* 数字按钮样式 */
        .number-btn {
            width: 160px;
            height: 100px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            margin: 0px 15px 30px 15px;
        }

        .number-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: rgba(255, 215, 0, 0.9);
        }

        body.dark .content {
            background-color: rgba(45, 45, 45, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body.dark .number-btn {
            background-color: rgba(61, 61, 61, 0.9);
            color: #f0f0f0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.dark .number-btn:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            background-color: rgba(0, 122, 255, 0.9);
        }

        /* 底部固定工具栏 */
        .toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: rgba(51, 51, 51, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 20px;
            transition: background-color 0.3s ease;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        body.dark .toolbar {
            background-color: rgba(18, 18, 18, 0.8);
        }

        .toolbar-btn {
            color: #fff;
            padding: 8px 15px;
            background-color: rgba(85, 85, 85, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        body.dark .toolbar-btn {
            background-color: rgba(68, 68, 68, 0.8);
        }

        .toolbar-btn:hover {
            background-color: rgba(255, 215, 0, 0.9);
            color: #333;
            transform: translateZ(0) scale(1.05);
        }

        body.dark .toolbar-btn:hover {
            background-color: rgba(0, 122, 255, 0.9);
            color: #ffffff;
            transform: translateZ(0) scale(1.05);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .sidebar {
                width: 100%;
                height: 200px; /* 移动端固定高度 */
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
                overflow-y: auto;
            }

            .sidebar-item {
                margin-bottom: 0;
                flex: 1;
                min-width: 80px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .content {
                height: 300px; /* 移动端固定高度 */
            }

            .number-btn {
                width: 60px;
                height: 60px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<!-- 主题切换按钮 -->
<div class="theme-switcher">
    <button class="theme-btn light-btn" onclick="switchTheme('light')">
        浅色模式
    </button>
    <button class="theme-btn dark-btn" onclick="switchTheme('dark')">
        深色模式
    </button>
</div>

<!-- 主包裹层 -->
<div class="main-wrapper">
    <div class="container">
        <!-- 左侧控制栏 -->
        <div class="sidebar">
            <div class="sidebar-item" onmouseover="showContent('个人信息')">
                个人信息
            </div>
            <div class="sidebar-item" onmouseover="showContent('主菜单')">
                主菜单
            </div>
            <div class="sidebar-item" onmouseover="showContent('商城菜单')">
                商城菜单
            </div>
            <div class="sidebar-item" onmouseover="showContent('传送菜单')">
                传送菜单
            </div>
            <div class="sidebar-item" onmouseover="showContent('地皮')">地皮</div>
        </div>

        <!-- 右侧内容框 -->
        <div class="content" id="contentBox"></div>
    </div>
</div>

<!-- 底部固定工具栏 -->
<div class="toolbar">
    <div class="toolbar-btn" onclick="toolbarAction('主城')">主城</div>
    <div class="toolbar-btn" onclick="toolbarAction('查询')">查询</div>
    <div class="toolbar-btn" onclick="toolbarAction('电脑')">电脑</div>
    <div class="toolbar-btn" onclick="toolbarAction('治疗')">治疗</div>
    <div class="toolbar-btn" onclick="toolbarAction('飞行')">飞行</div>
    <div class="toolbar-btn" onclick="toolbarAction('设家')">设家</div>
    <div class="toolbar-btn" onclick="toolbarAction('仓库')">仓库</div>
    <div
            class="toolbar-btn"
            onclick="toolbarAction('充值')"
            oncontextmenu="toolbarAction('充值', true)"
    >
        充值
    </div>
</div>
<script>
    function toolbarAction(type, isRight) {
        switch (type) {
            case "主城": {
                window.cefQuery({
                    request: "command(" + "spawn" + ")",
                });
                return;
            }
            case "查询": {
                window.cefQuery({
                    request: "command(" + "trmenu open 查询菜单" + ")",
                });
                return;
            }
            case "电脑": {
                window.cefQuery({
                    request: "command(" + "pc" + ")",
                });
                return;
            }
            case "治疗": {
                window.cefQuery({
                    request: "command(" + "pokeheal" + ")",
                });
                return;
            }
            case "飞行": {
                window.cefQuery({
                    request: "command(" + "fly" + ")",
                });
                return;
            }
            case "设家": {
                window.cefQuery({
                    request: "command(" + "trmenu open 我的地标" + ")",
                });
                return;
            }
            case "仓库": {
                window.cefQuery({
                    request: "command(" + "playerinv" + ")",
                });
                return;
            }
            case "充值": {
                if (isRight) {
                    window.cefQuery({
                        request: "command(" + "paypay ck" + ")",
                    });
                    return;
                }
                window.cefQuery({
                    request: "command(" + "trmenu open 充值" + ")",
                });
                return;
            }
        }
    }

    // 生成主菜单的按钮内容（16个按钮，验证左上堆积效果）
    function createMainMenuButtons() {
        const container = document.createElement("div");
        container.className = "content-buttons";

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "公会";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(" + "trmenu open 公会菜单" + ")",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "精灵信息";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(" + "ypb" + ")",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "交易所";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(" + "trmenu open 全球市场" + ")",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "排位";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(" + "trmenu open 精灵排位" + ")",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "称号";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(" + "plt open" + ")",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "活动";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(trmenu open 活动菜单)",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "签到";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(trmenu open 签到菜单)",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "邮箱";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(swiftmail)",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "在线";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(or open)",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "自杀";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(suicide)",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "地标";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(plw open)",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "成就";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(trmenu open 精灵收集)",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "随从";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(cpp open)",
                });
            };
            container.appendChild(btn);
        }

        {
            const btn = document.createElement("button");
            btn.className = "number-btn";
            btn.textContent = "任务";
            btn.onclick = function () {
                window.cefQuery({
                    request: "command(yct open 每日任务)",
                });
            };
            container.appendChild(btn);
        }

        return container;
    }

    // 鼠标悬浮时切换右侧内容
    function showContent(text) {
        const contentBox = document.getElementById("contentBox");
        contentBox.innerHTML = ""; // 清空内容

        if (text === "主菜单") {
            // 主菜单显示按钮列表
            const buttonsContainer = createMainMenuButtons();
            contentBox.appendChild(buttonsContainer);
        } else {
            // 其他菜单显示普通文本
            contentBox.innerText = text + " 页面内容";
        }
    }

    // 初始化显示个人信息
    showContent("个人信息");

    // 主题切换功能
    function switchTheme(theme) {
        if (theme === "dark") {
            document.body.classList.add("dark");
        } else {
            document.body.classList.remove("dark");
        }
        localStorage.setItem("theme", theme);
    }

    //发向服务端
    taichi({
        action: '发送自定义数据包',
        identifier: '自定义数据包标识',
        data: "数据内容"
    }).then(result => console.log(result))

    // 页面加载时恢复保存的主题
    window.onload = function () {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
            switchTheme(savedTheme);
        }

        // 优化滚动体验
        const sidebar = document.querySelector(".sidebar");
        let isScrolling = false;

        sidebar.addEventListener(
            "wheel",
            function (e) {
                e.preventDefault();
                if (!isScrolling) {
                    isScrolling = true;
                    const delta = e.deltaY * 0.8;
                    sidebar.scrollTop += delta;

                    setTimeout(() => {
                        isScrolling = false;
                    }, 16);
                }
            },
            {passive: false}
        );
    };
</script>
</body>
</html>
