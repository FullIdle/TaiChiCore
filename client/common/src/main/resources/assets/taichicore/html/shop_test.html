<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神兽商店</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Cinzel:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Noto Serif SC', serif;
    color: #f0e8ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .shop-container {
    width: 480px;
    background: rgba(10, 5, 30, 0.82);
    border: 1px solid rgba(180, 140, 255, 0.35);
    border-radius: 16px;
    backdrop-filter: blur(18px);
    box-shadow: 0 0 60px rgba(120, 60, 255, 0.25), inset 0 0 40px rgba(80, 30, 180, 0.12);
    overflow: hidden;
    position: relative;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* 顶部星光 */
  .shop-container::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 120px;
    background: radial-gradient(ellipse, rgba(160, 100, 255, 0.3) 0%, transparent 70%);
    pointer-events: none;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* 标题区 */
  .shop-header {
    padding: 18px 20px 12px;
    text-align: center;
    border-bottom: 1px solid rgba(180, 140, 255, 0.2);
    position: relative;
  }
  .shop-title {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #c8a0ff, #fff8, #a0c8ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
  }
  .shop-subtitle {
    font-size: 11px;
    color: rgba(200, 160, 255, 0.6);
    letter-spacing: 6px;
    margin-top: 2px;
  }
  .close-btn {
    position: absolute;
    right: 14px; top: 14px;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid rgba(200,160,255,0.4);
    background: rgba(80,40,160,0.4);
    color: #c8a0ff;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .close-btn:hover { background: rgba(160,80,255,0.5); transform: scale(1.1); }

  /* 世代选择 */
  .gen-tabs {
    display: flex;
    gap: 0;
    padding: 10px 14px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .gen-tabs::-webkit-scrollbar { display: none; }
  .gen-tab {
    flex-shrink: 0;
    padding: 5px 10px;
    font-size: 11px;
    letter-spacing: 1px;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    background: rgba(60,30,120,0.3);
    border: 1px solid rgba(140,100,255,0.2);
    border-bottom: none;
    color: rgba(200,160,255,0.5);
    transition: all 0.25s;
    position: relative;
    top: 1px;
  }
  .gen-tab:hover { color: rgba(200,160,255,0.85); background: rgba(80,40,150,0.4); }
  .gen-tab.active {
    background: rgba(80,40,180,0.55);
    border-color: rgba(180,140,255,0.45);
    color: #e0c8ff;
    font-weight: bold;
  }

  /* 神兽列表区 */
  .pokemon-panel {
    padding: 12px 14px;
    max-height: 370px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(140,100,255,0.4) transparent;
    border-top: 1px solid rgba(140,100,255,0.25);
  }

  .pokemon-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(60,30,110,0.35);
    border: 1px solid rgba(140,100,255,0.18);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.4s ease both;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateX(-10px); }
    to   { opacity:1; transform: translateX(0); }
  }
  .pokemon-card:hover {
    background: rgba(100,50,200,0.45);
    border-color: rgba(200,160,255,0.4);
    transform: translateX(3px);
    box-shadow: 0 0 20px rgba(140,80,255,0.2);
  }
  .pokemon-card.selected {
    background: rgba(120,60,220,0.5);
    border-color: rgba(220,180,255,0.6);
    box-shadow: 0 0 25px rgba(160,100,255,0.35);
  }
  .pokemon-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .poke-sprite {
    width: 52px; height: 52px;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 8px rgba(180,130,255,0.6));
    flex-shrink: 0;
    transition: transform 0.3s;
  }
  .pokemon-card:hover .poke-sprite { transform: scale(1.12) translateY(-2px); }
  .pokemon-card.selected .poke-sprite {
    animation: float 2s ease-in-out infinite;
    filter: drop-shadow(0 0 14px rgba(200,160,255,0.9));
  }
  @keyframes float {
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-4px); }
  }

  .poke-info { flex: 1; min-width: 0; }
  .poke-name { font-size: 14px; font-weight: bold; color: #e8d8ff; letter-spacing: 1px; }
  .poke-types { display: flex; gap: 4px; margin-top: 3px; }
  .type-badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 4px;
    letter-spacing: 1px;
    font-weight: bold;
  }
  .poke-desc { font-size: 10px; color: rgba(200,170,255,0.55); margin-top: 3px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .poke-price {
    text-align: right;
    flex-shrink: 0;
  }
  .price-val { font-size: 15px; font-weight: bold; color: #ffd700; letter-spacing: 1px; }
  .price-unit { font-size: 9px; color: rgba(255,215,0,0.55); }

  /* 底部购买区 */
  .shop-footer {
    padding: 12px 14px;
    border-top: 1px solid rgba(140,100,255,0.2);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .selected-info { flex: 1; font-size: 11px; color: rgba(200,170,255,0.7); }
  .selected-name { font-size: 13px; font-weight: bold; color: #e0c8ff; }

  .qty-control { display: flex; align-items: center; gap: 6px; }
  .qty-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(180,140,255,0.4);
    background: rgba(80,40,160,0.5);
    color: #c8a0ff;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    line-height: 1;
  }
  .qty-btn:hover { background: rgba(130,70,220,0.6); transform: scale(1.1); }
  .qty-num { font-size: 13px; font-weight: bold; color: #e8d8ff; min-width: 16px; text-align: center; }

  .buy-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #7030c8, #a060ff);
    color: #fff;
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 20px rgba(120,60,255,0.4);
    position: relative;
    overflow: hidden;
  }
  .buy-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
    pointer-events: none;
  }
  .buy-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(140,80,255,0.55); }
  .buy-btn:active { transform: translateY(0); }
  .buy-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* 类型颜色 */
  .t-psychic  { background:rgba(249,85,135,0.3);  color:#f9c8e0; border:1px solid rgba(249,85,135,0.4); }
  .t-fire     { background:rgba(255,120,60,0.3);   color:#ffd0a0; border:1px solid rgba(255,120,60,0.4); }
  .t-water    { background:rgba(80,160,255,0.3);   color:#b8d8ff; border:1px solid rgba(80,160,255,0.4); }
  .t-electric { background:rgba(255,210,40,0.3);   color:#fff0a0; border:1px solid rgba(255,210,40,0.4); }
  .t-ice      { background:rgba(100,210,255,0.3);  color:#c8f0ff; border:1px solid rgba(100,210,255,0.4); }
  .t-dragon   { background:rgba(100,80,220,0.3);   color:#c8c0ff; border:1px solid rgba(100,80,220,0.4); }
  .t-dark     { background:rgba(80,60,80,0.5);     color:#c0b0c0; border:1px solid rgba(140,100,140,0.4); }
  .t-steel    { background:rgba(140,140,160,0.3);  color:#d8d8e8; border:1px solid rgba(160,160,180,0.4); }
  .t-normal   { background:rgba(160,140,120,0.3);  color:#e0d8c8; border:1px solid rgba(160,140,120,0.4); }
  .t-flying   { background:rgba(140,160,255,0.3);  color:#c8d0ff; border:1px solid rgba(140,160,255,0.4); }
  .t-rock     { background:rgba(160,130,80,0.3);   color:#e0c890; border:1px solid rgba(160,130,80,0.4); }
  .t-ground   { background:rgba(200,160,80,0.3);   color:#f0dca0; border:1px solid rgba(200,160,80,0.4); }
  .t-ghost    { background:rgba(100,60,140,0.4);   color:#d0b8f0; border:1px solid rgba(120,80,180,0.4); }
  .t-fairy    { background:rgba(255,160,200,0.3);  color:#ffe0f0; border:1px solid rgba(255,160,200,0.4); }
  .t-grass    { background:rgba(80,180,80,0.3);    color:#b8f0b8; border:1px solid rgba(80,180,80,0.4); }
  .t-fighting { background:rgba(200,60,60,0.3);    color:#f0c0c0; border:1px solid rgba(200,60,60,0.4); }
  .t-poison   { background:rgba(160,60,160,0.3);   color:#f0b8f0; border:1px solid rgba(160,60,160,0.4); }

  /* 购买动画 */
  @keyframes buyFlash {
    0%   { box-shadow: 0 0 0 rgba(160,100,255,0); }
    50%  { box-shadow: 0 0 40px rgba(200,150,255,0.7); }
    100% { box-shadow: 0 0 0 rgba(160,100,255,0); }
  }
  .buy-flash { animation: buyFlash 0.5s ease; }

  /* 空状态 */
  .empty-state { text-align:center; padding: 30px; color: rgba(180,150,255,0.4); font-size:13px; }

  /* 粒子 */
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(200,160,255,0.8);
    pointer-events: none;
    animation: particleUp 1.2s ease-out forwards;
  }
  @keyframes particleUp {
    0%   { transform: translate(0,0) scale(1); opacity:1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity:0; }
  }

  .toast {
    position: absolute;
    bottom: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(80,200,120,0.9);
    color: #fff;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 6px 18px;
    border-radius: 20px;
    pointer-events: none;
    animation: toastAnim 1.8s ease forwards;
    z-index: 99;
  }
  @keyframes toastAnim {
    0%   { opacity:0; transform: translateX(-50%) translateY(6px); }
    15%  { opacity:1; transform: translateX(-50%) translateY(0); }
    80%  { opacity:1; }
    100% { opacity:0; transform: translateX(-50%) translateY(-6px); }
  }
</style>
</head>

// 用PokeAPI sprites (官方后向精灵图)
function spriteUrl(id) {
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
}

let currentGen = 1;
let selectedPokemon = null;
let quantity = 1;

function renderGenTabs() {
  const el = document.getElementById('genTabs');
  el.innerHTML = GENS.map(g => `
    <div class="gen-tab ${g.id === currentGen ? 'active' : ''}" onclick="selectGen(${g.id})">${g.label}</div>
  `).join('');
}

function renderPokemon() {
  const panel = document.getElementById('pokemonPanel');
  const list = POKEMON[currentGen] || [];
  if (!list.length) {
    panel.innerHTML = '<div class="empty-state">本世代暂无神兽</div>';
    return;
  }
  panel.innerHTML = list.map((p, i) => `
    <div class="pokemon-card ${selectedPokemon && selectedPokemon.id === p.id ? 'selected' : ''}"
         onclick="selectPokemon(${i})"
         style="animation-delay:${i * 0.05}s">
      <img class="poke-sprite" src="${spriteUrl(p.id)}" alt="${p.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22><text y=%2238%22 font-size=%2240%22>✨</text></svg>'">
      <div class="poke-info">
        <div class="poke-name">No.${p.id} ${p.name}</div>
        <div class="poke-types">${p.types.map(t => `<span class="type-badge t-${t}">${typeName(t)}</span>`).join('')}</div>
        <div class="poke-desc">${p.desc}</div>
      </div>
      <div class="poke-price">
        <div class="price-val">♦ ${p.price.toLocaleString()}</div>
        <div class="price-unit">神兽币</div>
      </div>
    </div>
  `).join('');
}

function typeName(t) {
  const map = {
    psychic:'超能',fire:'火',water:'水',electric:'电',ice:'冰',
    dragon:'龙',dark:'恶',steel:'钢',normal:'一般',flying:'飞行',
    rock:'岩石',ground:'地面',ghost:'幽灵',fairy:'妖精',
    grass:'草',fighting:'格斗',poison:'毒'
  };
  return map[t] || t;
}

function selectGen(id) {
  currentGen = id;
  selectedPokemon = null;
  quantity = 1;
  updateFooter();
  renderGenTabs();
  renderPokemon();
}

function selectPokemon(idx) {
  const list = POKEMON[currentGen] || [];
  selectedPokemon = list[idx];
  quantity = 1;
  updateFooter();
  renderPokemon();
}

function changeQty(delta) {
  quantity = Math.max(1, Math.min(99, quantity + delta));
  document.getElementById('qtyNum').textContent = quantity;
  updateFooter();
}

function updateFooter() {
  const info = document.getElementById('selectedInfo');
  const btn = document.getElementById('buyBtn');
  document.getElementById('qtyNum').textContent = quantity;
  if (selectedPokemon) {
    const total = selectedPokemon.price * quantity;
    info.innerHTML = `
      <div class="selected-name">${selectedPokemon.name}</div>
      <div style="color:rgba(255,215,0,0.75);font-size:11px;">合计 ♦ ${total.toLocaleString()} 神兽币</div>
    `;
    btn.disabled = false;
  } else {
    info.innerHTML = `<div style="color:rgba(200,160,255,0.4);font-size:11px;">请选择神兽</div>`;
    btn.disabled = true;
  }
}

function buyPokemon() {
  if (!selectedPokemon) return;
  const shop = document.getElementById('shop');
  shop.classList.add('buy-flash');
  setTimeout(() => shop.classList.remove('buy-flash'), 500);

  // 粒子爆炸
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 / 12) * i;
    const dist = 40 + Math.random() * 30;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.style.left = '50%'; p.style.bottom = '40px';
    p.style.background = `hsl(${260 + Math.random()*60}, 80%, 75%)`;
    p.style.animationDelay = Math.random() * 0.2 + 's';
    shop.appendChild(p);
    setTimeout(() => p.remove(), 1400);
  }

  // Toast
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = `✦ 成功购买 ${selectedPokemon.name} ×${quantity} ✦`;
  shop.appendChild(toast);
  setTimeout(() => toast.remove(), 1900);

  // 回调给MC
  taichi({
    action: "customPacket",
    identifier: 'buyPokemon',
    data: JSON.stringify({
        id: selectedPokemon.id,
        name: selectedPokemon.name,
        quantity: quantity,
        totalPrice: selectedPokemon.price * quantity
    })
  });
}

function closeShop() {
  const shop = document.getElementById('shop');
  shop.style.transition = 'opacity 0.3s, transform 0.3s';
  shop.style.opacity = '0';
  shop.style.transform = 'scale(0.95) translateY(-8px)';
  setTimeout(() => {
    taichi({
        action: "close"
    });
  }, 320);
}

// 初始化
renderGenTabs();
renderPokemon();
updateFooter();
</script>
