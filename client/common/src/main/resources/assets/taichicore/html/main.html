<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>TaiChiDemo</title>
</head>
<style>
    * {
        /*刚刚调的时间太快，快到0.1秒都没有*/
        transition: all 1.0s; /*过度动画所用时长*/
    }

    body {
        text-align: center;
        /*半透明黑色*/
        background-color: rgba(0, 0, 0, 0); /*底层背景颜色*/
    }

    h1 {
        background-color: rgba(0, 0, 0, 0.1);
    }

    h1:hover { /*鼠标悬浮在h1元素时*/
        transform: rotate(90deg); /*旋转九十度*/
        color: red;
        background-color: rgba(0, 0, 0, 1);
    }

    img {
        height: 256px;
        width: 256px;
    }

    img:hover {
        transform: scale(1.5); /*放大到1.5倍*/
    }

    /*对test也就是渲染玩家组件进行css处理*/
    .test {
        /*显示模式改成 block或者inline-block*/
        display: inline-block; /* 自定义元素默认inline，transform对inline元素无效 */
        border: 2px solid red; /*描边*/
        /*通常情况下，width最好和要渲染元素的width一样，这样更好控制*/
        width: 200px; /*现实的大小(实际上不是渲染结果的大小渲染结果，在使用组件的时候就需要定义好)*/
        height: 100px; /*这个大小只是让显示的框，也就是画布的大小而已*/
    /*    左边是之前的taichi://render/player静态图 右边是实时渲染画布*/
    }

    .test:hover {
        transform: scale(5);
    }
</style>
<script src="D:\IdeaProjects\TaiChiCore\client\common\src\main\resources\assets\taichicore\html\script\taichi.js"></script>
<body>
<h1>你好,TaiChiCore</h1>
<!--导入组件-->
<img alt="" src="taichi://render/player?width=256&height=256&scale=1&rotX=0.0&rotY=0.0&rotZ=0.0">
<!--使用渲染玩家组件-->
<taichi-render-player class="test" roX="0.0"></taichi-render-player>
</body>
<script>
</script>
</html>
