<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>TaiChiDemo</title>
</head>
<style>
    * {
        /*刚刚调的时间太快，快到0.1秒都没有*/
        transition: all 1.0s; /*过度动画所用时长*/
    }

    body {
        text-align: center;
        /*半透明黑色*/
        background-color: rgba(0, 0, 0, 0); /*底层背景颜色*/
    }

    h1 {
        background-color: rgba(0, 0, 0, 0.1);
    }

    h1:hover { /*鼠标悬浮在h1元素时*/
        transform: rotate(90deg); /*旋转九十度*/
        color: red;
        background-color: rgba(0, 0, 0, 1);
    }

    img {
        height: 256px;
        width: 256px;
    }

    img:hover {
        transform: scale(1.5); /*放大到1.5倍*/
    }

    .test {
        width: 146px;
        height: 146px;
        display: inline-block;
    }

    /*对test也就是渲染玩家组件进行css处理*/
    .test:hover {
        transform: scale(1.5);
    }
</style>
<!--导入taichi-->
<script src="taichi://mod/taichicore/html/script/taichi.js"></script>
<body>
<h1>你好,TaiChiCore</h1>
<!--实时渲染玩家组件 画布-->
<taichi-render class="test" type="player" width="146" height="146" rotX="0" rotY="0" rotZ="0"></taichi-render>
</body>
<script>
</script>
</html>
