<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>TaiChiDemo</title>
</head>
<style>
    * {
        /*刚刚调的时间太快，快到0.1秒都没有*/
        transition: all 1.0s; /*过度动画所用时长*/
        user-select: none;
    }

    body {
        text-align: center;
        /*半透明黑色*/
        background-color: rgba(0, 0, 0, 0); /*底层背景颜色*/
    }

    h1 {
        background-color: rgba(0, 0, 0, 0.1);
    }

    h1:hover { /*鼠标悬浮在h1元素时*/
        transform: rotate(90deg); /*旋转九十度*/
        color: red;
        background-color: rgba(0, 0, 0, 1);
    }

    .img-player {
        height: 146px;
        width: 146px;
    }

    .img-player:hover {
        transform: scale(1.5);
    }

    .img-item {
        height: 64px;
        width: 64px;
    }

    .img-item:hover {
        transform: scale(1.5);
    }

    .player {
        width: 146px;
        height: 146px;
        display: inline-block;
        border-radius: 10%;
        border: 1px solid #000000;
        background-color: red;
    }


    .item {
        width: 64px;
        height: 64px;
        display: inline-block;
        border-radius: 10%;
        border: 1px solid #000000;
        background-color: red;
    }

    .player:hover {
        transform: scale(1.5);
    }

    .item:hover {
        transform: scale(1.5);
    }
</style>
<!--导入taichi-->
<script src="D:\IdeaProjects\TaiChiCore\client\common\src\main\resources\assets\taichicore\html\script\taichi.js"></script>
<body>
<h1>你好,TaiChiCore</h1>
<img class="img-player" src="taichi://render/player?width=146&height=146&scale=1.0&rotX=0.0&rotY=0.0&rotZ=0.0" alt="">
<img class="img-item" src="taichi://render/item" alt="">
<!--实时渲染玩家组件 画布-->
<taichi-render class="player" type="player" width="146" height="146" scale="0.8" follow_mouse="false"></taichi-render>
<taichi-render class="item" type="item" width="64" height="64"></taichi-render>
</body>
<script>
</script>
</html>
