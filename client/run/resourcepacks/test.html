<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鼠标跟随蓝色方块</title>
    <style>
        /* 重置默认样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面容器样式 */
        body {
            width: 100vw;
            height: 100vh;
            /* 半透明灰色背景 */
            background-color: rgba(128, 128, 128, 0.2);
            /* 防止滚动条出现 */
            overflow: hidden;
            cursor: none; /* 隐藏原生鼠标指针（可选） */
        }

        /* 蓝色小方块样式 */
        #follow-box {
            position: absolute;
            width: 40px;       /* 方块宽度 */
            height: 40px;      /* 方块高度 */
            background-color: #2196F3; /* 蓝色 */
            border-radius: 4px; /* 轻微圆角（可选） */
            /* 让方块中心点跟随鼠标（更自然） */
            transform: translate(-50%, -50%);
            /* 过渡效果（可选，让移动更丝滑） */
            transition: transform 0.02s ease;
            /* 确保方块在最上层 */
            z-index: 9999;
            pointer-events: none; /* 防止方块遮挡鼠标事件 */
        }
    </style>
</head>
<body>
<!-- 蓝色跟随方块 -->
<div id="follow-box"></div>

<script>
    // 获取方块元素
    const followBox = document.getElementById('follow-box');

    // 监听鼠标移动事件
    document.addEventListener('mousemove', (e) => {
        // 更新方块位置为鼠标坐标
        followBox.style.left = `${e.clientX}px`;
        followBox.style.top = `${e.clientY}px`;
    });

    // 可选：处理窗口大小变化时的兼容性
    window.addEventListener('resize', () => {
        // 重置位置防止偏移
        followBox.style.left = `${window.innerWidth / 2}px`;
        followBox.style.top = `${window.innerHeight / 2}px`;
    });
</script>
</body>
</html>
