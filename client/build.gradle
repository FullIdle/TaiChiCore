apply plugin: 'dev.architectury.loom'
apply plugin: 'architectury-plugin'


group = 'org.figsq.taichicore.taichicore'
version = '1.0-SNAPSHOT'

architectury {
    minecraft = '1.20.1'
    platformSetupLoomIde()
    fabric()
}

loom {
    def file = file('src/main/resources/taichicore.accesswidener')
    println file.getAbsolutePath()
    accessWidenerPath = file
}

repositories {
    maven {
        url = uri('https://mcef-download.cinemamod.com/repositories/releases')
    }
    // Optional for snapshot versions
    maven {
        url = uri('https://mcef-download.cinemamod.com/repositories/snapshots')
    }
}

dependencies {
    minecraft "net.minecraft:minecraft:1.20.1"
    mappings "net.fabricmc:yarn:1.20.1+build.1:v2"

    modImplementation "net.fabricmc:fabric-loader:0.16.14"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.92.5+1.20.1"

/*
    modImplementation 'com.cinemamod:mcef:2.1.6-1.20.1'
*/
    modImplementation 'com.cinemamod:mcef-fabric:2.1.6-1.20.1'

    pack rootProject.project(":common")
}

processResources {
    inputs.property 'version', project.version

    filesMatching('fabric.mod.json') {
        expand version: project.version
    }
}
