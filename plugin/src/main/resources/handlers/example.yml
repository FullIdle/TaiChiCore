# 一些又客户端视角发来的自定义数据包逻辑编写
# 通常逻辑是 客户端视角html已经写好的taichi调用 -> 客户端侧MC发送自定义数据包 -> 服务端接受
# -> 以下处理逻辑 -> 自己是否发送回去数据包 -> 是的话客户端html内注册好的处理逻辑 -> 客户端接受返回的处理逻辑

# 一些内置的函数/成员
# js引擎本身就有的 引擎用的是OpenJDK Nashorn
# print(msg) 输出到控制台 void
# println(msg) 输出到控制台带换行 void
# load(path) 加载并执行另一个JS文件 void
# loadWithNewGlobal(path) 在新全局作用域加载JS文件 void
# Java.type(className) 导入Java类 Class
# importPackage(pkg) 导入整个Java包 void
# importClass(cls) 导入单个Java类 void
# JSON.parse(str) 解析JSON字符串为JS对象 Object
# JSON.stringify(obj) 将JS对象序列化为JSON字符串 String
# TaiChiCore主动添加的
# player 发送来的玩家 Player(Bukkit)
# data 发送来的数据 String
# Bukkit Bukkit类本身 Class<Bukkit>
# papi('%player_name%') 以玩家身份解析papi变量 String
# handler 暂时算是该配置本身 YamlConfiguration
# packet('标识', '数据') 给玩家发送一个自定义包 void
# packet('标识', '数据', Player(Bukkit 目标玩家)) 给目标玩家发送一个自定义包 void
# tell('Hello World'...) 给玩家发送信息 void
# bc('Hello World'...) 全服通知 (非BungeeCord的全服) void
# title('主信息') 显示在屏幕正中间的信息(懒得实现复杂的~) void
# close() 为玩家关闭界面 !这不会在乎它打开的是什么界面，反正就是关! void
# open('url') 为玩家直接打开一个页面(会有关闭上个页面的过程) url参数可有写法可以看看gui配置 void
# navigate('url') 为玩家当前页面导航到新页面(直接跳转没有关闭过程) void
# gui('gui标识') 为玩家打开一个配置好标识的GUI(继承GUI的一些功能比如持续化) void
#   没有通过gui标识跳转GUI的，因为两个gui配置会串
# command('命令'...) 以玩家身份执行命令 void
# console('命令'...) 以后台身份执行命令 void
# op('命令'...) 以op身份执行命令 void
#
# 一些提示
# JSON.parse(data).key 获取data的key值
# tell('Hello','World!') 发送两条信息
# Java.type('org.bukkit.Bukkit').getServer().broadcastMessage('Hello World!') 通过导入java侧类调用Bukkit类的方法
# importClass(org.bukkit.Bukkit).getServer().broadcastMessage('Hello World!') 通过导入java侧类(类名不需要字符串格式)调用Bukkit类的方法
# Bukkit.getServer().broadcastMessage('Hello World!') 调用Bukkit类的方法 于上方等同
# JSON.stringify({key: 'value', key1: 'value1'}) 将一个对象序列化为JSON字符串
# player.isOp() Bukkit中的判断玩家是否是op Boolean

# 接受的自定义数据包的标识符
identifier: example
handler: |
  print(`玩家:${player.getName()} 发送了标识为 example, 数据为: ${data} 的数据包`)
  tell(`你发送了标识为 example, 数据为: ${data} 的数据包`);
  command('say hello world');
