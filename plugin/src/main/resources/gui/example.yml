#标识  可以通过命令给指定玩家打开指定标识的ui(不管任何类型)
identifier: example
# 这里写的是脚本，执行结果如果是字符串
# 那么就会直接按照字符串的匹配方式来匹配屏幕名
# 最终结果也可以是boolean
# 可用变了 titleName 屏幕标题名 title 标题组件(Component对象)
match-script: 'titleName.equals("example")'
# {resource} 客户端侧资源包文件夹的绝对路径
# url: file://{resource}/gui/example.html 客户端文件路径
# url: taichi://mod/模组名/jar内资源文件路径 模组内路径 更多taichi://方案路径去看看这里把 TODO 哎嘿我没写呢~
# url: https://example.com/example.html 网络地址
url: 'https://example.com/example.html'
# 持久化 玩家关闭界面时候，不会将浏览器关闭，这样可以做到第二次打开不会黑屏（不建议给每个界面都整上那样太多了，太多垃圾设备会卡）
persistent: false
# 开启持久化的时候该项才有用   会在除去第一次打开的时候自动重写加载url配置的地址
reload: false